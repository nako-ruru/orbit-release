name: 纯自动化全平台测试

on: [push, workflow_dispatch]

env:
  PYTHONUTF8: 1 # 全局开启 Python 的 UTF-8 强流模式

jobs:
  automation-test:
    name: 自动化测试 (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      # ------------------ Linux 专属：构建常驻虚拟桌面 ------------------
      - name: (仅Linux) 开启常驻虚拟显示器
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y scrot xvfb libwebkit2gtk-4.1-dev libgtk-3-dev
          # 在后台悄悄启动一个 1080P 的虚拟屏幕
          Xvfb :99 -screen 0 1920x1080x24 &
          # 将 DISPLAY 挂载到 GitHub 全局环境变量中，后续所有步骤自动继承
          echo "DISPLAY=:99" >> $GITHUB_ENV

      # ------------------ 核心测试流水线（全平台原生一致） ------------------
      - name: 1. 执行安装脚本
        run: python test-install.py

      - name: 2. 休息 2 分钟等待程序拉起及稳定
        run: python -c "import time; time.sleep(120)"

      - name: 3. 初始化内网诊断链路
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: 4. 分析测试结果
        run: python analyze-test-result.py
        env:
          RELEASE_TAG: ${{ github.ref_name }}