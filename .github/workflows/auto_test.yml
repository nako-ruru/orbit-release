name: 纯自动化全平台测试

on: [push, workflow_dispatch]

env:
  PYTHONUTF8: 1 # 全局开启 Python 的 UTF-8 强流模式

jobs:
  # ==================== 任务一：多端自动化测试矩阵 ====================
  automation-test:
    name: 自动化测试 (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: (仅Linux) 开启常驻虚拟显示器
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y scrot xvfb libwebkit2gtk-4.1-dev libgtk-3-dev
          Xvfb :99 -screen 0 1920x1080x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV

      # 🎯 核心修正：在全平台网络都 100% 干净时，提前把 psutil 乱刀装好
      - name: 准备 Python 审计依赖
        run: pip install psutil

# 🎯 强行同步安装 WebView2 并刺穿 Session 0 隔离墙
      - name: (Windows Only) Force Synchronous WebView2 Runtime Installation
        if: matrix.os == 'windows-latest'
        shell: powershell
        run: |
          Write-Host "Starting WebView2 deployment via Chocolatey..."
          choco install webview2-runtime -y --no-progress
          
          $wv2Path = Resolve-Path "C:\Program Files (x86)\Microsoft\EdgeWebView\Application\*\msedgewebview2.exe" | Select-Object -First 1
          if ($wv2Path) {
              $wv2Dir = Split-Path -Parent $wv2Path.Path
              Write-Host "Found WebView2 Core Directory: $wv2Dir"
              
              # 1. 之前已成功的核心路径
              echo "WEBVIEW2_BROWSER_EXECUTABLE_FOLDER=$wv2Dir" >> $env:GITHUB_ENV
              
              # 2. 🌟 核心大招：强制 WebView2 绕过 GPU 硬件加速，改用软件合成器（Software Compositor）
              echo "WEBVIEW2_ADDITIONAL_BROWSER_ARGUMENTS=--disable-gpu --disable-software-rasterizer --headless" >> $env:GITHUB_ENV
              
              Write-Host "Successfully injected all WebView2 CI environments to GITHUB_ENV."
          } else {
              Write-Error "Failed to locate msedgewebview2.exe!"
              exit 1
          }

      # 2. 执行安装脚本 (此时 Python、Installer 乃至最终的 orbit.exe 都会自动自带该环境变量)
      - name: 1. 执行安装脚本
        run: python test-install.py

      - name: 2. 休息 2 分钟等待程序拉起及稳定
        run: python -c "import time; time.sleep(15)"

      - name: 3. 初始化内网诊断链路
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      # 🎯 新增步骤：强行杀掉 Tailscale 的前端 UI 进程，保留后台网络服务
      - name: (仅Windows) 清理 Tailscale GUI 弹窗防止遮挡
        if: matrix.os == 'windows-latest'
        run: taskkill /f /im tailscale-ipn.exe || exit 0
        shell: cmd

      - name: 4. 分析测试结果
        run: python analyze-test-result.py
        env:
          RELEASE_TAG: ${{ github.ref_name }}

  # ==================== 任务二：流水分支合并后的单次收尾 ====================
  finalize-verification:
    name: 自动化测试收尾与状态同步
    needs: automation-test # 严格依赖：必须等上面三个系统全部成功亮绿勾，才会触发这里
    runs-on: ubuntu-latest

    steps:
      - name: 连接内网诊断链路
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: 触发资产状态同步事件
        run: |
          curl "http://100.113.111.18:1337/api/StartAction" \
            --json '{"bindingId": "thumbsup-generate"}'