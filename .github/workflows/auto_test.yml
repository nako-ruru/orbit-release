name: 纯自动化全平台测试

on: [push, workflow_dispatch]

env:
  PYTHONUTF8: 1 # 强行让所有平台的 Python 统一支持中文输出

jobs:
  automation-test:
    name: 自动化测试 (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      # 针对 Linux 环境的特殊处理：补齐截图所需的虚拟显示器和完整的 Webview 依赖
      - name: (仅Linux) 准备图形依赖环境
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y scrot xvfb libwebkit2gtk-4.1-dev libgtk-3-dev

      # 1. 执行安装脚本（通过 if 条件隔离环境，Windows 走原生环境杜绝挂起）
      - name: 1. 执行安装脚本 (Windows / macOS)
        if: matrix.os != 'ubuntu-latest'
        run: python test-install.py

      - name: 1. 执行安装脚本 (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: xvfb-run python test-install.py

      # 2. 休息 2 分钟等待程序拉起及稳定
      - name: 2. 休息 2 分钟等待程序拉起及稳定
        run: python -c "import time; time.sleep(120)"

      # 3. 初始化内网诊断链路
      - name: 3. 初始化内网诊断链路
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      # 4. 分析测试结果
      - name: 4. 分析测试结果 (Windows / macOS)
        if: matrix.os != 'ubuntu-latest'
        run: python analyze-test-result.py
        env:
          RELEASE_TAG: ${{ github.ref_name }}

      - name: 4. 分析测试结果 (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: xvfb-run python analyze-test-result.py
        env:
          RELEASE_TAG: ${{ github.ref_name }}