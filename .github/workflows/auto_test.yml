name: 纯自动化全平台测试

on: [push, workflow_dispatch]

env:
  PYTHONUTF8: 1 # 全局开启 Python 的 UTF-8 强流模式

jobs:
  # ==================== 任务一：多端自动化测试矩阵 ====================
  automation-test:
    name: 自动化测试 (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: (仅Linux) 开启常驻虚拟显示器
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y scrot xvfb libwebkit2gtk-4.1-dev libgtk-3-dev
          Xvfb :99 -screen 0 1920x1080x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV

      - name: 1. 执行安装脚本
        run: python test-install.py

      - name: 2. 休息 2 分钟等待程序拉起及稳定
        run: python -c "import time; time.sleep(120)"

      - name: 3. 初始化内网诊断链路
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      # 🎯 新增步骤：强行杀掉 Tailscale 的前端 UI 进程，保留后台网络服务
      - name: (仅Windows) 清理 Tailscale GUI 弹窗防止遮挡
        if: matrix.os == 'windows-latest'
        run: taskkill /f /im tailscale-ipn.exe || exit 0
        shell: cmd

      - name: 4. 分析测试结果
        run: python analyze-test-result.py
        env:
          RELEASE_TAG: ${{ github.ref_name }}

  # ==================== 任务二：流水分支合并后的单次收尾 ====================
  finalize-verification:
    name: 自动化测试收尾与状态同步
    needs: automation-test # 严格依赖：必须等上面三个系统全部成功亮绿勾，才会触发这里
    runs-on: ubuntu-latest

    steps:
      - name: 连接内网诊断链路
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: 触发资产状态同步事件
        run: |
          curl "http://100.113.111.18:1337/api/StartAction" \
            --json '{"bindingId": "thumbsup-generate"}'