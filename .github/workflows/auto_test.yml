name: 纯自动化全平台测试

on: [push, workflow_dispatch]

env:
  PYTHONUTF8: 1 # 强行让所有平台的 Python 统一支持中文输出

jobs:
  automation-test:
    name: 自动化测试 (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    # 核心：定义矩阵，一行代码直接召唤 3 台官方托管的服务器
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      # 针对 Linux 环境的特殊处理：补齐截图所需的虚拟显示器和依赖
      - name: (仅Linux) 准备图形依赖环境
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y scrot xvfb

      - name: 1. 执行安装脚本
        # 统一使用 bash 语法，方便做跨平台判断
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            # Linux 必须包裹在 xvfb-run 后面执行，否则主程序会因为找不到显示器崩溃
            xvfb-run python test-install.py
          else
            python test-install.py
          fi

      - name: 2. 休息 2 分钟等待程序拉起及稳定
        run: python -c "import time; time.sleep(120)"

      - name: 3. 初始化内网诊断链路
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: 4. 分析测试结果
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            xvfb-run python analyze-test-result.py
          else
            python analyze-test-result.py
          fi
        env:
          RELEASE_TAG: ${{ github.ref_name }}